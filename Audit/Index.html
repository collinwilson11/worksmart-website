function Node({ x, y, w = 160, h = 70, title, lines = [], status = “neutral”, tag }) {
const st = {
ok: { bg: “rgba(46,139,87,0.08)”, border: “rgba(46,139,87,0.4)”, tag: C.greenLight, tagBg: “rgba(46,139,87,0.15)” },
warn: { bg: “rgba(212,168,67,0.08)”, border: “rgba(212,168,67,0.35)”, tag: C.amber, tagBg: “rgba(212,168,67,0.15)” },
critical: { bg: “rgba(224,82,82,0.08)”, border: “rgba(224,82,82,0.35)”, tag: C.red, tagBg: “rgba(224,82,82,0.15)” },
info: { bg: “rgba(74,155,217,0.08)”, border: “rgba(74,155,217,0.35)”, tag: C.blue, tagBg: “rgba(74,155,217,0.15)” },
neutral: { bg: C.navyMid, border: “rgba(255,255,255,0.12)”, tag: C.textMid, tagBg: “rgba(255,255,255,0.08)” },
purple: { bg: “rgba(139,111,192,0.08)”, border: “rgba(139,111,192,0.35)”, tag: C.purple, tagBg: “rgba(139,111,192,0.15)” },
}[status];
const tagLabels = { bottleneck: “BOTTLENECK”, disconnect: “DISCONNECT”, manual: “MANUAL”, working: “WORKING” };
return (
<g>
<rect x={x} y={y} width={w} height={h} rx={7} fill={st.bg} stroke={st.border} strokeWidth={1.5} />
<text x={x + 12} y={y + 20} fill={C.white} fontSize={12.5} fontWeight={700} fontFamily=”‘DM Sans’,sans-serif”>{title}</text>
{lines.map((l, i) => (
<text key={i} x={x + 12} y={y + 36 + i * 14} fill={C.textMid} fontSize={10} fontFamily=”‘DM Sans’,sans-serif”>{l}</text>
))}
{tag && (
<>
<rect x={x + 12} y={y + h - 22} width={tagLabels[tag].length * 6.5 + 12} height={16} rx={3} fill={st.tagBg} />
<text x={x + 18} y={y + h - 10} fill={st.tag} fontSize={8} fontWeight={700} letterSpacing={1} fontFamily=”‘IBM Plex Mono’,monospace”>{tagLabels[tag]}</text>
</>
)}
</g>
);
}

function Conn({ x1, y1, x2, y2, color = “rgba(255,255,255,0.18)”, dash = false, label, labelSide = “above” }) {
const lx = (x1 + x2) / 2;
const ly = labelSide === “below” ? (y1 + y2) / 2 + 14 : (y1 + y2) / 2 - 6;
return (
<g>
<line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.8} fill=“none” strokeDasharray={dash ? “6 4” : “none”} />
<circle cx={x2} cy={y2} r={3.5} fill={color} />
{label && (
<>
<rect x={lx - label.length * 3.3 - 6} y={ly - 10} width={label.length * 6.6 + 12} height={16} rx={4} fill={C.navyMid} stroke={color} strokeWidth={0.8} />
<text x={lx} y={ly + 1} textAnchor=“middle” fill={color} fontSize={8.5} fontWeight={700} fontFamily=”‘IBM Plex Mono’,monospace”>{label}</text>
</>
)}
</g>
);
}

function SectionTitle({ children, sub }) {
return (
<div style={{ marginBottom: 24 }}>

function FindingCard({ severity, title, desc, impact, impactType = “loss” }) {
const cfg = {
critical: { bg: “rgba(224,82,82,0.06)”, border: “rgba(224,82,82,0.2)”, color: C.red, label: “● CRITICAL” },

opportunity: { bg: “rgba(74,155,217,0.06)”, border: “rgba(74,155,217,0.2)”, color: C.blue, label: “◆ OPPORTUNITY” },
strength: { bg: “rgba(46,139,87,0.06)”, border: “rgba(46,139,87,0.2)”, color: C.greenLight, label: “✓ STRENGTH” },
}[severity];
return (
<div style={{ background: cfg.bg, border: `1px solid ${cfg.border}`, borderRadius: 6, padding: “18px 20px” }}>
<div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.5, color: cfg.color, marginBottom: 8 }}>{cfg.label}</div>
<div style={{ fontSize: 14, fontWeight: 700, color: C.white, marginBottom: 5 }}>{title}</div>
<div style={{ fontSize: 12, color: C.textMid, lineHeight: 1.55 }}>{desc}</div>
{impact && <div style={{ marginTop: 10, fontFamily: “‘IBM Plex Mono’,monospace”, fontSize: 12, fontWeight: 600, color: impactType === “loss” ? C.red : C.greenLight }}>{impact}</div>}
</div>
);
}

function Badge({ text, color }) {
const bg = { red: “rgba(224,82,82,0.12)”, amber: “rgba(212,168,67,0.12)”, green: “rgba(46,139,87,0.12)”, blue: “rgba(74,155,217,0.12)” }[color];
const fg = { red: C.red, amber: C.amber, green: C.greenLight, blue: C.blue }[color];
return <span style={{ background: bg, color: fg, fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: “uppercase”, padding: “3px 8px”, borderRadius: 3, marginLeft: 8 }}>{text}</span>;
}

function DiagramBox({ title, children }) {
return (
<div style={{ background: C.navyMid, border: `1px solid ${C.border}`, borderRadius: 8, padding: 28, overflowX: “auto” }}>
{title && <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: “uppercase”, color: C.green, marginBottom: 18 }}>{title}</div>}

</div>

}

function Legend({ items }) {
return (
<div style={{ display: “flex”, gap: 20, flexWrap: “wrap”, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.border}` }}>
{items.map((it, i) => (
<div key={i} style={{ display: “flex”, alignItems: “center”, gap: 6 }}>
{it.type === “line” && <div style={{ width: 20, height: 0, borderTop: `2px ${it.dash ? "dashed" : "solid"} ${it.color}` }} />}
{it.type === “dot” && <div style={{ width: 10, height: 10, borderRadius: 3, background: it.bg, border: `1.5px solid ${it.color}` }} />}
<span style={{ fontSize: 10, color: C.textDim }}>{it.label}</span>
</div>
))}
</div>
);
}

function TableRow({ cols, header = false }) {

<div style={{ display: “grid”, gridTemplateColumns: cols.map(c => c.w || “1fr”).join(” “), gap: 12, padding: header ? “0 0 10px” : “9px 0”, borderBottom: `1px solid ${header ? "rgba(255,255,255,0.12)" : C.border}`, alignItems: “center” }}>

</span>

</div>
